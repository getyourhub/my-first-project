version: '3.8'

services:
  subtitles:
    image: getyourhub/subtitles:latest
    build: .
    container_name: subtitles
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MIMO_API_KEY=${MIMO_API_KEY}
      - PORT=5000
    restart: unless-stopped